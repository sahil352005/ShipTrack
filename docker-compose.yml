# ══════════════════════════════════════════════════════════════════════════════
#  Real-Time Logistics & Supply Chain Analytics Platform
#  docker-compose.yml  (lightweight images edition)
# ══════════════════════════════════════════════════════════════════════════════

networks:
  logistics-net:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:

services:

  # ── Kafka (KRaft mode — no Zookeeper needed, saves ~120 MB) ───────────────
  kafka:
    image: apache/kafka:latest
    pull_policy: if_not_present
    container_name: kafka
    networks: [logistics-net]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 2
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka Topic Init ───────────────────────────────────────────────────────
  kafka-init:
    image: apache/kafka:latest
    pull_policy: if_not_present
    container_name: kafka-init
    networks: [logistics-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists
       --topic shipment-events --partitions 3 --replication-factor 1 &&
       echo 'Topic shipment-events created'"
    restart: "no"

  # ── PostgreSQL (alpine — smallest official image ~85 MB) ──────────────────
  postgres:
    image: postgres:16-alpine
    pull_policy: if_not_present
    container_name: postgres
    networks: [logistics-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: logistics_user
      POSTGRES_PASSWORD: logistics_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics_user -d logistics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: logistics-api
    networks: [logistics-net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://logistics_user:logistics_pass@postgres:5432/logistics
    restart: unless-stopped

  # ── Kafka Producer ─────────────────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: logistics-producer
    networks: [logistics-net]
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark ETL ──────────────────────────────────────────────────────────────
  spark-etl:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-etl
    networks: [logistics-net]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/spark-checkpoints:/tmp/checkpoints
    restart: unless-stopped

  # ── Grafana (slim official image ~300 MB) ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    pull_policy: if_not_present
    container_name: grafana
    networks: [logistics-net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/logistics.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    restart: unless-stopped
